<style>
:root {
  --bg:#0e0d0b; --bg2:#161410; --bg3:#1e1b16;
  --gold:#C8A96E; --gdim:rgba(200,169,110,0.12); --gline:rgba(200,169,110,0.25);
  --cream:#F7F3EC; --cdim:rgba(247,243,236,0.55);
  --red:#e05555; --green:#4caf7d;
  --serif:'Cormorant Garamond',serif; --sans:'Raleway',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--cream);font-family:var(--sans);min-height:100vh;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--gline);}

/* ── LOGIN ── */
#loginScreen {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:20px;
}
.login-box {
  width:100%; max-width:360px;
  border:1px solid var(--gline); padding:40px 32px; background:var(--bg2);
}
.login-title {
  font-family:var(--serif); font-size:22px; font-weight:600;
  color:var(--gold); text-align:center; margin-bottom:6px; letter-spacing:0.06em;
}
.login-sub {
  font-size:9px; letter-spacing:0.25em; text-transform:uppercase;
  color:var(--cdim); text-align:center; margin-bottom:28px;
}
.field { margin-bottom:14px; }
.field label { display:block; font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--cdim); margin-bottom:6px; }
.field input {
  width:100%; background:var(--bg3); border:1px solid var(--gline);
  color:var(--cream); font-family:var(--sans); font-size:13px;
  padding:10px 12px; outline:none; transition:border .2s;
}
.field input:focus { border-color:var(--gold); }
.btn {
  width:100%; padding:11px; background:var(--gdim); border:1px solid var(--gold);
  color:var(--gold); font-family:var(--sans); font-size:10px; font-weight:500;
  letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; transition:all .2s;
}
.btn:hover { background:rgba(200,169,110,0.22); }
.btn.danger { border-color:var(--red); color:var(--red); background:rgba(220,85,85,0.08); }
.btn.danger:hover { background:rgba(220,85,85,0.18); }
.btn.success { border-color:var(--green); color:var(--green); background:rgba(76,175,125,0.08); }
#loginErr { color:var(--red); font-size:11px; text-align:center; margin-top:12px; min-height:16px; }

/* ── APP ── */
#appScreen { display:none; }

/* TOP BAR */
.topbar {
  position:sticky; top:0; z-index:100;
  background:rgba(14,13,11,0.96); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--gline);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; height:52px;
}
.topbar-logo { font-family:var(--serif); font-size:18px; font-weight:600; color:#fff; letter-spacing:0.05em; }
.topbar-logo span { color:var(--gold); }
.topbar-right { display:flex; align-items:center; gap:10px; }
.topbar-user { font-size:10px; letter-spacing:0.15em; color:var(--cdim); }
.topbar-btn {
  background:none; border:1px solid var(--gline); color:var(--cdim);
  font-family:var(--sans); font-size:9px; letter-spacing:0.15em; text-transform:uppercase;
  padding:5px 10px; cursor:pointer; transition:all .2s;
}
.topbar-btn:hover { border-color:var(--gold); color:var(--gold); }

/* TABS */
.tabs {
  display:flex; gap:0; border-bottom:1px solid var(--gline);
  background:var(--bg2); padding:0 20px; overflow-x:auto; scrollbar-width:none;
}
.tabs::-webkit-scrollbar { display:none; }
.tab {

  color:var(--cdim); font-family:var(--sans); font-size:10px; font-weight:500;
  letter-spacing:0.18em; text-transform:uppercase; padding:14px 16px;

}
.tab:hover { color:var(--cream); }
.tab.active { color:var(--gold); border-bottom-color:var(--gold); }

/* VIEWS */
.view { display:none; padding:24px 20px; max-width:1100px; margin:0 auto; }
.view.active { display:block; }

/* ── EVENTS VIEW ── */

}
.view-title { font-family:var(--serif); font-size:22px; font-weight:600; color:var(--gold); }

/* Category filter */

.cat-tab:hover { border-color:var(--gold); color:var(--gold); }
.cat-tab.active { background:var(--gdim); border-color:var(--gold); color:var(--gold); }

/* Events table */
.ev-table { width:100%; border-collapse:collapse; }

/* ── FORM ── */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

.form-full { grid-column:1/-1; }

.field-group label { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--cdim); }
.field-group input, .field-group select, .field-group textarea {

}
.field-group input:focus, .field-group select:focus, .field-group textarea:focus { border-color:var(--gold); }
.field-group textarea { resize:vertical; min-height:90px; }
.field-group select option { background:var(--bg3); }
.form-actions { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.form-actions .btn { width:auto; flex:1; min-width:120px; }
.form-title { font-family:var(--serif); font-size:20px; font-weight:600; color:var(--gold); margin-bottom:20px; }
.form-section { font-size:8.5px; letter-spacing:0.25em; text-transform:uppercase; color:var(--cdim); margin:20px 0 12px; padding-bottom:6px; border-bottom:1px solid var(--gline); grid-column:1/-1; }

/* POSTER PREVIEW */
.poster-preview { width:80px; height:110px; border:1px solid var(--gline); object-fit:cover; display:block; }
.poster-placeholder { width:80px; height:110px; border:1px solid var(--gline); background:var(--bg3); display:flex; align-items:center; justify-content:center; }
.poster-placeholder span { font-size:8px; color:var(--cdim); text-align:center; padding:4px; letter-spacing:0.1em; text-transform:uppercase; }

/* TOAST */
#toast {
  position:fixed; bottom:24px; right:24px; z-index:9999;
  background:var(--bg3); border:1px solid var(--gline);
  padding:12px 20px; font-size:12px; letter-spacing:0.1em;
  opacity:0; transform:translateY(10px); transition:all .3s;
  pointer-events:none; max-width:300px;
}
#toast.show { opacity:1; transform:translateY(0); }
#toast.ok { border-color:var(--green); color:var(--green); }
#toast.err { border-color:var(--red); color:var(--red); }

/* MODAL EDIT */
.modal-overlay {
  position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.75); backdrop-filter:blur(4px);
  display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open { display:flex; }
.modal-box {
  background:var(--bg2); border:1px solid var(--gline);
  width:100%; max-width:680px; max-height:90vh; overflow-y:auto;
  padding:28px; position:relative;
}
.modal-close {
  position:absolute; top:14px; right:14px;
  background:none; border:none; color:var(--cdim); font-size:18px; cursor:pointer;
}
.modal-close:hover { color:var(--gold); }

/* CONFIRM */
.confirm-overlay {
  position:fixed; inset:0; z-index:600;
  background:rgba(0,0,0,0.8); display:none;
  align-items:center; justify-content:center; padding:20px;
}
.confirm-overlay.open { display:flex; }
.confirm-box {
  background:var(--bg2); border:1px solid var(--red);

.confirm-title { font-family:var(--serif); font-size:18px; color:var(--red); margin-bottom:10px; }
.confirm-msg { font-size:12px; color:var(--cdim); margin-bottom:20px; line-height:1.6; }
.confirm-btns { display:flex; gap:10px; justify-content:center; }
.confirm-btns .btn { width:auto; min-width:100px; }

/* RESPONSIVE TABLE */
@media(max-width:700px) {
  .ev-table thead { display:none; }
  .ev-table tr { display:block; border:1px solid var(--gline); margin-bottom:10px; padding:12px; }
  .ev-table td { display:block; padding:4px 0; border:none; }
}
</style>

<script>
/* ── STATE ── */
let ALL_EVENTS = [];
let CURRENT_CAT = 'all';
let EDIT_ID = null;

/* ── HELPERS ── */
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 3000);
}

function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  const months = ['','Ιαν','Φεβ','Μαρ','Απρ','Μαϊ','Ιουν','Ιουλ','Αυγ','Σεπ','Οκτ','Νοε','Δεκ'];
  return `${parseInt(day)} ${months[parseInt(m)]} ${y}`;
}

const CAT_LABELS = {
  cinehub:'CineHub', musichub:'MusicHub', logohub:'LogoHub',
  arthub:'ArtHub', stagehub:'StageHub'
};

/* ── AUTH ── */
window.addEventListener('auth-change', e => {
  const user = e.detail;
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    document.getElementById('topbarUser').textContent = user.email;
    // Small delay to ensure Firestore is ready
    setTimeout(() => { loadEvents(); loadAbout(); loadMembers(); }, 300);
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }
});

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const err   = document.getElementById('loginErr');
  err.textContent = '';
  try {
    await window._fa.signInWithEmailAndPassword(window._auth, email, pass);
  } catch(e) {
    err.textContent = 'Λάθος email ή κωδικός.';
  }
}
document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogout() {
  await window._fa.signOut(window._auth);
}

/* ── TABS ── */
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('view-' + name).classList.add('active');
  if (name === 'events') loadEvents();
  if (name === 'members') loadMembers();
}

/* ── LOAD EVENTS ── */
async function loadEvents() {
  const container = document.getElementById('eventsContainer');
  container.innerHTML = '<div class="loading-msg">Φόρτωση εκδηλώσεων…</div>';
  try {
    const { collection, getDocs, query, orderBy } = window._fs;
    const snap = await getDocs(query(collection(window._db,'events'), orderBy('date','asc')));
    ALL_EVENTS = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderEvents();
  } catch(e) {
    container.innerHTML = `<div class="empty-msg" style="color:var(--red);">Σφάλμα φόρτωσης: ${e.message}</div>`;
  }
}

function filterCat(cat, el) {
  CURRENT_CAT = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  renderEvents();
}

function renderEvents() {
  const container = document.getElementById('eventsContainer');
  const list = CURRENT_CAT === 'all' ? ALL_EVENTS : ALL_EVENTS.filter(e => e.category === CURRENT_CAT);

  if (!list.length) {
    container.innerHTML = '<div class="empty-msg">Δεν βρέθηκαν εκδηλώσεις.</div>';
    return;
  }

  const rows = list.map(ev => `
    <tr>
      <td>
        ${ev.posterUrl
          ? `<img src="${ev.posterUrl}" class="poster-preview" onerror="this.style.display='none'">`
          : `<div class="poster-placeholder"><span>Χωρίς αφίσα</span></div>`}
      </td>
      <td>
        <div class="ev-date">${fmtDate(ev.date)}${ev.time ? ' · ' + ev.time : ''}</div>
      </td>
      <td>
        <div class="ev-title">${ev.title || '—'}</div>
        ${ev.description ? `<div style="color:var(--cdim);font-size:11px;margin-top:3px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${ev.description}</div>` : ''}
      </td>
      <td><span class="ev-cat">${CAT_LABELS[ev.category] || ev.category || '—'}</span></td>
      <td class="ev-venue">${ev.venue || '—'}</td>
      <td>
        <div class="ev-actions">
          <button class="act-btn" onclick="editEvent('${ev.id}')">✏️ Επεξεργασία</button>
          <button class="act-btn del" onclick="confirmDeleteId('${ev.id}','${(ev.title||'').replace(/'/g,"\\'")}')">🗑 Διαγραφή</button>
        </div>
      </td>
    </tr>
  `).join('');

  container.innerHTML = `
    <table class="ev-table">
      <thead>
        <tr>
          <th>Αφίσα</th>
          <th>Ημερομηνία</th>
          <th>Τίτλος</th>
          <th>Κατηγορία</th>
          <th>Χώρος</th>
          <th>Ενέργειες</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:12px;font-size:10px;color:var(--cdim);letter-spacing:0.15em;">${list.length} εκδηλώσεις</div>
  `;
}

/* ── EDIT EVENT ── */
function editEvent(id) {
  const ev = ALL_EVENTS.find(e => e.id === id);
  if (!ev) return;
  EDIT_ID = id;
  // Switch to form tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab')[1].classList.add('active');
  document.getElementById('view-add').classList.add('active');
  // Fill form
  document.getElementById('formTitle').textContent = '✏️ Επεξεργασία Εκδήλωσης';
  document.getElementById('editId').value = id;
  document.getElementById('fTitle').value   = ev.title || '';
  document.getElementById('fCat').value     = ev.category || '';
  document.getElementById('fVenue').value   = ev.venue || '';
  document.getElementById('fDate').value    = ev.date || '';
  document.getElementById('fTime').value    = ev.time || '';
  document.getElementById('fDesc').value    = ev.description || '';
  document.getElementById('fCountry').value = ev.country || '';
  document.getElementById('fPeople').value  = (ev.people || []).join('\n');
  document.getElementById('fPoster').value  = ev.posterUrl || '';
  document.getElementById('fTrailer').value = ev.trailerUrl || '';
  document.getElementById('fTickets').value = ev.ticketsUrl || '';
  document.getElementById('btnDelete').style.display = 'block';
  window.scrollTo(0,0);
}

function clearForm() {
  EDIT_ID = null;
  document.getElementById('formTitle').textContent = '+ Νέα Εκδήλωση';
  document.getElementById('editId').value = '';
  ['fTitle','fCat','fVenue','fDate','fTime','fDesc','fCountry','fPeople','fPoster','fTrailer','fTickets'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('formMsg').textContent = '';
}

/* ── SAVE EVENT ── */
async function saveEvent() {
  const title = document.getElementById('fTitle').value.trim();
  const cat   = document.getElementById('fCat').value;
  const date  = document.getElementById('fDate').value;
  if (!title || !cat || !date) {
    document.getElementById('formMsg').innerHTML = '<span style="color:var(--red);">Συμπλήρωσε Τίτλο, Κατηγορία και Ημερομηνία.</span>';
    return;
  }
  const data = {
    title, category: cat,
    venue:     document.getElementById('fVenue').value.trim(),
    date,
    time:      document.getElementById('fTime').value,
    description: document.getElementById('fDesc').value.trim(),
    country:   document.getElementById('fCountry').value.trim(),
    people:    document.getElementById('fPeople').value.split('\n').map(s=>s.trim()).filter(Boolean),
    posterUrl: document.getElementById('fPoster').value.trim(),
    trailerUrl:document.getElementById('fTrailer').value.trim(),
    ticketsUrl:document.getElementById('fTickets').value.trim(),
    updatedAt: Date.now(),
  };
  const msg = document.getElementById('formMsg');
  msg.textContent = 'Αποθήκευση…';
  try {
    const { collection, addDoc, doc, updateDoc } = window._fs;
    const editId = document.getElementById('editId').value;
    if (editId) {
      await updateDoc(doc(window._db,'events',editId), data);
      toast('✓ Η εκδήλωση ενημερώθηκε!');
    } else {
      data.createdAt = Date.now();
      data.votes = {};
      await addDoc(collection(window._db,'events'), data);
      toast('✓ Η εκδήλωση αποθηκεύτηκε!');
    }
    msg.innerHTML = '';
    clearForm();
    loadEvents();
  } catch(e) {
    msg.innerHTML = `<span style="color:var(--red);">Σφάλμα: ${e.message}</span>`;
  }
}

/* ── DELETE ── */
function confirmDeleteId(id, title) {
  EDIT_ID = id;
  document.getElementById('confirmMsg').textContent = `Θέλεις σίγουρα να διαγραφεί η εκδήλωση "${title}";`;
  document.getElementById('confirmOverlay').classList.add('open');
}
function confirmDelete() {
  const id = document.getElementById('editId').value;
  const title = document.getElementById('fTitle').value;
  confirmDeleteId(id, title);
}
async function doDelete() {
  document.getElementById('confirmOverlay').classList.remove('open');
  if (!EDIT_ID) return;
  try {
    const { doc, deleteDoc } = window._fs;
    await deleteDoc(doc(window._db,'events',EDIT_ID));
    toast('✓ Διαγράφηκε!');
    clearForm();
    switchTabByName('events');
    loadEvents();
  } catch(e) {
    toast('Σφάλμα διαγραφής: ' + e.message, 'err');
  }
}

function switchTabByName(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const idx = {events:0,add:1,members:2,about:3}[name] || 0;
  document.querySelectorAll('.tab')[idx].classList.add('active');
  document.getElementById('view-'+name).classList.add('active');
}

/* ── ABOUT ── */
async function loadAbout() {
  try {
    const { collection, getDocs } = window._fs;
    const snap = await getDocs(collection(window._db,'about'));
    snap.forEach(d => {
      const data = d.data();
      if (data.el) document.getElementById('aboutEl').value = data.el;
      if (data.en) document.getElementById('aboutEn').value = data.en;
    });
    if (snap.empty) {
      document.getElementById('aboutMsg').innerHTML = '<span style="color:var(--cdim);">Δεν υπάρχει αποθηκευμένο κείμενο ακόμα.</span>';
    }
  } catch(e) {
    document.getElementById('aboutMsg').innerHTML = `<span style="color:var(--red);">Σφάλμα φόρτωσης: ${e.message}</span>`;
  }
}

async function saveAbout() {
  const el = document.getElementById('aboutEl').value.trim();
  const en = document.getElementById('aboutEn').value.trim();
  const msg = document.getElementById('aboutMsg');
  msg.textContent = 'Αποθήκευση…';
  try {
    const { collection, getDocs, addDoc, doc, updateDoc } = window._fs;
    const snap = await getDocs(collection(window._db,'about'));
    if (snap.empty) {
      await addDoc(collection(window._db,'about'), {el, en, updatedAt: Date.now()});
    } else {
      await updateDoc(doc(window._db,'about',snap.docs[0].id), {el, en, updatedAt: Date.now()});
    }
    msg.innerHTML = '<span style="color:var(--green);">✓ Αποθηκεύτηκε!</span>';
    toast('✓ Κείμενο αποθηκεύτηκε!');
  } catch(e) {
    msg.innerHTML = `<span style="color:var(--red);">Σφάλμα: ${e.message}</span>`;
  }
}

/* ── MEMBERS ── */
async function loadMembers() {
  const c = document.getElementById('membersContainer');
  c.innerHTML = '<div class="loading-msg">Φόρτωση μελών…</div>';
  try {
    const { collection, getDocs } = window._fs;
    const snap = await getDocs(collection(window._db,'members'));
    if (snap.empty) { c.innerHTML = '<div class="empty-msg">Δεν βρέθηκαν μέλη.</div>'; return; }
    const rows = snap.docs.map(d => {
      const m = d.data();
      return `<tr>
        <td>${m.photoUrl ? `<img src="${m.photoUrl}" style="width:50px;height:50px;object-fit:cover;border:1px solid var(--gline);">` : '—'}</td>
        <td style="font-family:var(--serif);font-size:15px;font-weight:600;">${m.name||'—'}</td>
        <td style="color:var(--cdim);font-size:11px;">${m.role||'—'}</td>
        <td><button class="act-btn del" onclick="deleteMember('${d.id}')">🗑</button></td>
      </tr>`;
    }).join('');
    c.innerHTML = `<table class="ev-table"><thead><tr><th>Φωτό</th><th>Όνομα</th><th>Ρόλος</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
  } catch(e) {
    c.innerHTML = `<div class="empty-msg" style="color:var(--red);">Σφάλμα: ${e.message}</div>`;
  }
}

async function deleteMember(id) {
  if (!confirm('Διαγραφή μέλους;')) return;
  try {
    const { doc, deleteDoc } = window._fs;
    await deleteDoc(doc(window._db,'members',id));
    toast('✓ Το μέλος διαγράφηκε!');
    loadMembers();
  } catch(e) { toast('Σφάλμα: '+e.message,'err'); }
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
}

/* Enter to login */
document.getElementById('loginEmail').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('loginPass').focus(); });
</script>
